name: Build APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:  # permite lanzarlo manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build Next.js (export estático para Capacitor)
        run: npm run build
        env:
          BUILD_TARGET: capacitor
          NEXT_TELEMETRY_DISABLED: 1

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Dar permisos a Gradle
        run: chmod +x android/gradlew

      - name: Build APK debug
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Subir APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alfred-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Mostrar info del build
        run: |
          echo "✓ APK generada correctamente"
          ls -lh android/app/build/outputs/apk/debug/app-debug.apk
          echo "Descárgala desde: Actions → este workflow → Artifacts"
