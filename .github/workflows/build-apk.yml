name: Build APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Crear directorio out/ para Capacitor
        # La app usa Vercel como servidor remoto, no necesita build local
        # Capacitor solo necesita que exista el webDir para hacer sync
        run: mkdir -p out && echo "<html><body>app</body></html>" > out/index.html

      - name: Sincronizar plugins de Capacitor
        run: npx cap sync android --inline

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Dar permisos a Gradle
        run: chmod +x android/gradlew

      - name: Build APK debug
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: Alfred-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
